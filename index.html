<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#020105">
    <title>The Fading Light</title>
    <link rel="stylesheet" href="css/style.css?v=0.5.4">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
    <div id="game-container">
        <button id="fullscreen-btn" title="Fullscreen">
            <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
        </button>
        <div id="hud" style="display:none">
            <div class="hud-left">
                <div class="hud-bar">
                    <label>Health</label>
                    <div class="bar-bg"><div class="bar-fill" id="health-fill" style="width:100%"></div></div>
                </div>
                <div class="hud-bar">
                    <label>Fire</label>
                    <div class="bar-bg"><div class="bar-fill" id="fuel-fill" style="width:100%"></div></div>
                </div>
                <div class="hud-bar">
                    <label id="fire-level-label">Lv.1</label>
                    <div class="bar-bg"><div class="bar-fill" id="fire-level-fill" style="width:0%;background:linear-gradient(90deg,#8844ff,#cc66ff)"></div></div>
                </div>
            </div>
            <div class="hud-right">
                <div class="resource-row">
                    <div class="resource-item"><span class="resource-icon" style="background:#8B6914"></span> <span id="res-wood">0</span></div>
                    <div class="resource-item"><span class="resource-icon" style="background:#888"></span> <span id="res-stone">0</span></div>
                    <div class="resource-item"><span class="resource-icon" style="background:#b87333"></span> <span id="res-metal">0</span></div>
                    <div class="resource-item"><span class="resource-icon" style="background:#FFD700"></span> <span id="res-gold">0</span></div>
                </div>
            </div>
        </div>
        <div id="objectives-panel">
            <div id="objectives-header">OBJECTIVES</div>
            <div id="objectives-list"></div>
        </div>
        <div id="hint-text" style="display:none">WASD move | SPACE / LMB attack | E / RMB interact | TAB crafting | B build</div>
        <div id="weapon-display"></div>
        <div id="crafting-menu">
            <h2>Crafting</h2>
            <div id="craft-list"></div>
        </div>
        <div id="mobile-controls">
            <div id="touch-joystick-zone" class="touch-zone">
                <div id="touch-joystick-base"></div>
                <div id="touch-joystick-thumb"></div>
            </div>
            <div id="touch-attack-btn" class="touch-zone">ATK</div>
            <div id="touch-interact-btn" class="touch-zone">USE</div>
        </div>
        <div id="shop-menu" style="display:none">
            <h2>Wandering Merchant</h2>
            <div id="shop-list"></div>
            <div id="shop-close-btn">Close</div>
        </div>
        <div id="chat-input-container" style="display:none">
            <input type="text" id="chat-input" maxlength="80" placeholder="Type a message..." autocomplete="off">
        </div>
        <div id="game-over-screen">
            <h1>DARKNESS CONSUMED YOU</h1>
            <p id="game-over-stats"></p>
            <div class="go-buttons">
                <button onclick="location.reload()">Try Again</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script src="js/config.js?v=0.5.4"></script>
    <script src="js/audio.js?v=0.5.4"></script>
    <script src="js/network.js?v=0.5.4"></script>
    <script src="js/mobile.js?v=0.5.4"></script>
    <script src="js/textures.js?v=0.5.4"></script>
    <script src="js/menu.js?v=0.5.4"></script>
    <script src="js/game.js?v=0.5.4"></script>
    <script src="js/main.js?v=0.5.4"></script>
    <script src="js/bot.js?v=0.5.4"></script>
    <script src="js/autotest.js?v=0.5.4"></script>
    <script>
        // Expose game scene for bot AI (updated when GameScene starts)
        window._gs = null;
        const _origCreate = GameScene.prototype.create;
        GameScene.prototype.create = function() {
            _origCreate.call(this);
            window._gs = this;
        };

        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }

        // Fullscreen toggle
        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            const el = document.documentElement;
            if (!document.fullscreenElement) {
                (el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen).call(el);
            } else {
                (document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen).call(document);
            }
        });
    </script>
</body>
</html>
